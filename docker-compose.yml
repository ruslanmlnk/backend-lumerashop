services:
  lumera:
    image: postgres:15-alpine
    container_name: lumera
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lumera
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lif/postgresql/data

volumes:
  pgdata:
